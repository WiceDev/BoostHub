# Redirect HTTP to HTTPS and www
server {
    listen 80;
    server_name priveboost.com www.priveboost.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.priveboost.com$request_uri;
    }
}

# Redirect bare domain to www (HTTPS)
server {
    listen 443 ssl;
    server_name priveboost.com;

    ssl_certificate     /etc/letsencrypt/live/priveboost.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/priveboost.com/privkey.pem;

    return 301 https://www.priveboost.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name www.priveboost.com;

    ssl_certificate     /etc/letsencrypt/live/priveboost.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/priveboost.com/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 10M;

    # Static files (served by Nginx directly)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # Django app (reverse proxy to Gunicorn)
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (notifications)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}
